name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  NODE_VERSION: 22
  PNPM_VERSION: 10.33.0
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  api:
    name: API · lint, tests and build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: localco
          POSTGRES_PASSWORD: localco_dev
          POSTGRES_DB: localco_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U localco -d localco_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://localco:localco_dev@localhost:5432/localco_db
      BETTER_AUTH_SECRET: test_better_auth_secret_at_least_32_chars
      BETTER_AUTH_URL: http://localhost:4000
      FRONTEND_URL: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
      RESEND_API_KEY: test_resend_api_key
      STRIPE_SECRET_KEY: sk_test_localco_ci
      STRIPE_WEBHOOK_SECRET: whsec_localco_ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Apply Prisma migrations
        run: pnpm db:deploy

      - name: Lint API
        run: pnpm lint:api

      - name: Run API tests
        run: pnpm test:api --runInBand

      - name: Build API
        run: pnpm build:api

  web:
    name: Web · lint and build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      NODE_ENV: production
      DATABASE_URL: postgresql://localco:localco_dev@localhost:5432/localco_db
      BETTER_AUTH_SECRET: test_better_auth_secret_at_least_32_chars
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:4000/api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint web
        run: pnpm lint:web

      - name: Build web
        run: pnpm build:web

  shop:
    name: Shop · lint and build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:4000/api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint shop
        run: pnpm lint:shop

      - name: Build shop
        run: pnpm build:shop

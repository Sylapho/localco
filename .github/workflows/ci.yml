name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true
  NODE_VERSION: 22
  PNPM_VERSION: 10.33.0
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  validate:
    name: Validate · lint, tests and build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: localco
          POSTGRES_PASSWORD: localco_dev
          POSTGRES_DB: localco_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U localco -d localco_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://localco:localco_dev@localhost:5432/localco_db
      BETTER_AUTH_SECRET: test_better_auth_secret_at_least_32_chars
      BETTER_AUTH_URL: http://localhost:4000
      FRONTEND_URL: http://localhost:3000
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
      RESEND_API_KEY: test_resend_api_key
      STRIPE_SECRET_KEY: sk_test_localco_ci
      STRIPE_WEBHOOK_SECRET: whsec_localco_ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Apply Prisma migrations
        run: pnpm db:deploy

      - name: Lint all apps
        run: pnpm lint

      - name: Run API tests
        run: pnpm test:api --runInBand

      - name: Build all apps
        run: pnpm build

      - name: Audit dependencies
        run: pnpm audit --audit-level high
        continue-on-error: true

  shop-e2e:
    name: Shop · Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: validate

    env:
      CI: true
      NODE_ENV: test
      NEXT_TELEMETRY_DISABLED: 1
      NEXT_PUBLIC_API_URL: http://localhost:4000/api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @localco/shop exec playwright install --with-deps chromium

      - name: Run shop E2E tests
        run: pnpm test:shop:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/shop/playwright-report/
          retention-days: 7
name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  api-tests:
    name: API tests
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://localco:localco_dev@localhost:5432/localco_db
      CLERK_SECRET_KEY: test_clerk_secret

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @localco/api exec prisma generate

      - name: Run API tests
        run: pnpm --filter @localco/api test --runInBand

  web-build:
    name: Web build
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web
        run: pnpm --filter web build
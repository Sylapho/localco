version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      npm-minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      actions-minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: docker
    directory: /apps/api
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    groups:
      docker-minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: docker
    directory: /apps/web
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    groups:
      docker-minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: docker
    directory: /apps/shop
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    groups:
      docker-minor-and-patch:
        update-types:
          - minor
          - patch
